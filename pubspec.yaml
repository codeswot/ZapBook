name: zapbook
description: "Read together. Share progress. Get sats"
publish_to: 'none'

version: 0.0.4+2

environment:
  sdk: ^3.12.0


dependencies:
  archive: ^4.0.9  
  crypto: ^3.0.7
  device_info_plus: ^10.1.0
  package_info_plus: ^8.3.1
  equatable: ^2.0.8
  file_picker: ^8.1.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  fonnx:
    git:
      url: https://github.com/codeswot/fonnx.git
      ref: 0d6e1201fb6189d06afd8c7fc04ca0be29ef6929
  get_it: ^9.2.1
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  injectable: ^3.0.0
  intl: ^0.20.2
  logging: ^1.3.0
  lucide_icons_flutter: ^3.1.14+2
  path_provider: ^2.1.5
  printing: ^5.14.3
  shared_preferences: ^2.5.5
  syncfusion_flutter_pdf: ^33.2.8
  ulid: ^2.0.1
  xml: ^6.6.1  
  marmot_dart: ^0.0.4
  image: ^4.8.0
  flutter_secure_storage: ^10.3.1  
  ndk: ^0.8.3
  sqlite3: ^3.3.3
  flutter_svg: ^2.3.0
  cached_network_image: ^3.4.1
  http: ^1.2.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  reading_progress: ^0.0.1

dependency_overrides:
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  bloc_test: ^10.0.0
  injectable_generator: ^3.0.2
  build_runner: ^2.15.0
  go_router_builder: ^4.3.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon_square.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon_square.png"
  remove_alpha_ios: true
  background_color_ios: "#000000"

flutter:
  assets:
    - assets/
    - assets/models/
    - google_fonts/

  uses-material-design: true
